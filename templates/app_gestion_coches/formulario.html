{% extends 'app_gestion_coches/base.html' %}
{% block titulo %}{{ titulo }}{% endblock %}
{% block contenido %}
    <h2>{{ titulo }}</h2>
    <div class="form-container">
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit">Guardar</button>
        </form>
    </div>
    <p><a href="javascript:history.back()">← Volver</a></p>
{% endblock %}
