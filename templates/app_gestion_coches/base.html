<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>{% block titulo %}Taller{% endblock %}</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        h1, h2 {
            color: #333;
        }
        nav {
            margin-bottom: 20px;
            padding: 10px;
            background-color: #f1f1f1;
            border-radius: 5px;
        }
        nav a {
            color: blue;
            text-decoration: none;
            margin-right: 15px;
            font-weight: bold;
        }
        nav a:hover {
            text-decoration: underline;
        }
        .item-list {
            border: 1px solid #ccc;
            padding: 10px;
            margin: 10px 0;
            background-color: white;
            border-radius: 5px;
        }
        .form-container {
            background: #f9f9f9;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 5px;
            max-width: 500px;
        }
        button, .btn {
            margin-top: 10px;
            padding: 8px 12px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
        }
        button:hover, .btn:hover {
            background-color: #0056b3;
        }
        a {
            color: blue;
            text-decoration: none;
        }
        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <nav>
        <a href="{% url 'inicio' %}">Inicio</a> |
        <a href="{% url 'acerca' %}">Acerca de</a> |
        <a href="{% url 'contacto' %}">Contacto</a> |
        <a href="{% url 'lista_clientes' %}">Clientes</a> |
        <a href="{% url 'lista_coches' %}">Coches</a> |
        <a href="{% url 'lista_servicios' %}">Servicios</a>
    </nav>
    <hr>
    {% block contenido %}
    {% endblock %}
</body>
</html>
